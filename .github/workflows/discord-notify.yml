name: Discord Notifications

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, closed]
  issues:
    types: [opened, reopened, closed]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send message to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT" = "push" ]; then
            MSG="📦 New push to ${{ github.ref_name }} by ${{ github.actor }} - ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          elif [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            USER="${{ github.event.pull_request.user.login }}"
            MSG="👀 PR ${ACTION}: ${TITLE} by ${USER} - ${URL}"
          elif [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            USER="${{ github.event.issue.user.login }}"
            MSG="🐞 Issue ${ACTION}: ${TITLE} by ${USER} - ${URL}"
          elif [ "$EVENT" = "release" ]; then
            TITLE="${{ github.event.release.name }}"
            URL="${{ github.event.release.html_url }}"
            MSG="🚀 Release published: ${TITLE} - ${URL}"
          fi

          curl -H "Content-Type: application/json" \
               -d "$(printf '{"content":"%s"}' "$MSG")" \
               "$DISCORD_WEBHOOK"
